<!-- Micro-interactions Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.glass-card');
            
            cards.forEach(card => {
                let startX;
                let currentX;
                let isDragging = false;

                card.addEventListener('touchstart', (e) => {
                    startX = e.touches[0].clientX;
                    isDragging = true;
                    card.style.transition = 'none';
                });

                card.addEventListener('touchmove', (e) => {
                    if (!isDragging) return;
                    currentX = e.touches[0].clientX;
                    const diff = currentX - startX;
                    
                    if (diff < 0) { // Swiping left
                        const transform = Math.max(diff, -100);
                        card.style.transform = `translateX(${transform}px)`;
                        
                        // Increase background visibility based on swipe
                        const bgIndicator = card.parentElement.querySelector('.swipe-indicator');
                        if (bgIndicator) {
                            bgIndicator.style.opacity = Math.abs(transform) / 100;
                        }
                    }
                });

                card.addEventListener('touchend', (e) => {
                    isDragging = false;
                    card.style.transition = 'transform 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
                    
                    const diff = currentX - startX;
                    if (diff < -80) {
                        card.style.transform = `translateX(-100%)`;
                        setTimeout(() => {
                            card.parentElement.style.maxHeight = '0px';
                            card.parentElement.style.opacity = '0';
                            card.parentElement.style.marginBottom = '0px';
                            card.parentElement.style.padding = '0px';
                            setTimeout(() => card.parentElement.remove(), 300);
                        }, 200);
                    } else {
                        card.style.transform = 'translateX(0px)';
                    }
                });
            });

            // Smooth appear animation for cards
            const recordingItems = document.querySelectorAll('[data-id]');
            recordingItems.forEach((item, index) => {
                item.style.opacity = '0';
                item.style.transform = 'translateY(20px)';
                setTimeout(() => {
                    item.style.transition = 'all 0.5s ease';
                    item.style.opacity = '1';
                    item.style.transform = 'translateY(0)';
                }, index * 50);
            });
        });
    </script>
