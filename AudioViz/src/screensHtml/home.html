<!-- Micro-interactions Script -->
<script>
        // Subtle hover movement for waveform
        const bars = document.querySelectorAll('.waveform-bar');
        document.addEventListener('mousemove', (e) => {
            const mouseX = e.clientX / window.innerWidth;
            bars.forEach((bar, index) => {
                const shift = Math.sin(mouseX * 10 + index) * 5;
                bar.style.transform = `translateY(${shift}px)`;
            });
        });

        // Record Button Interaction
        const recordBtn = document.querySelector('button.relative.w-40');
        let isRecording = false;

        recordBtn.addEventListener('click', () => {
            isRecording = !isRecording;
            if (isRecording) {
                recordBtn.classList.remove('from-primary-container', 'to-secondary-container');
                recordBtn.classList.add('bg-error', 'shadow-[0_0_50px_rgba(255,180,171,0.5)]');
                document.querySelector('h2').innerText = 'Recording...';
                document.querySelector('h2').classList.add('text-error');
            } else {
                recordBtn.classList.add('from-primary-container', 'to-secondary-container');
                recordBtn.classList.remove('bg-error', 'shadow-[0_0_50px_rgba(255,180,171,0.5)]');
                document.querySelector('h2').innerText = 'Tap to Record';
                document.querySelector('h2').classList.remove('text-error');
            }
        });
    </script>
